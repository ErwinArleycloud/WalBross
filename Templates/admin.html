<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"> <!-- Codificación de caracteres -->
    <title>Panel Admin | El buen pollo </title> <!-- Título de la pestaña -->
    <!-- Importa Bootstrap desde CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light"> <!-- Fondo gris claro -->

    <div class="container mt-5"> <!-- Contenedor principal con margen superior -->

        <!-- Encabezado con título y botón de cerrar sesión -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Panel de Control - Wal-Bross</h2>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-danger">Cerrar Sesión</a>
        </div>

        <!-- Tarjeta para añadir nuevo producto -->
        <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
            <h2 class="text-center mb-4">Añadir Nuevo Producto</h2>
            
            <!-- Formulario para crear producto -->
            <form method="POST" enctype="multipart/form-data">
                <!-- Campo nombre -->
                <div class="mb-3">
                    <label class="form-label">Nombre del Producto</label>
                    <input type="text" name="nombre" class="form-control" required>
                </div>
                <!-- Campo descripción -->
                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea name="descripcion" class="form-control" required></textarea>
                </div>
                <!-- Campo precio -->
                <div class="mb-3">
                    <label class="form-label">Precio</label>
                    <input type="number" name="precio" class="form-control" required>
                </div>
                <!-- Campo imagen -->
                <div class="mb-3">
                    <label class="form-label">Foto del Producto</label>
                    <input type="file" name="imagen_archivo" class="form-control" accept="image/*" required>
                </div>
                <!-- Campo categoría -->
                <div class="mb-3">
                    <label class="form-label">Categoría</label>
                    <select name="categoria" class="form-select">
                        <option value="pollos">Pollos</option>
                        <option value="combos">Combos</option>
                        <option value="bebidas">Bebidas</option>
                        <option value="adicionales">Adicionales</option>
                    </select>
                </div>
                <!-- Checkbox de promoción -->
                <div class="form-check mb-3">
                    <input type="checkbox" name="es_promocion" class="form-check-input" id="promo">
                    <label class="form-check-label" for="promo">¿Es oferta?</label>
                </div>
                <!-- Botón guardar -->
                <button type="submit" class="btn btn-danger w-100">Guardar Producto</button>
            </form>
        </div>

        <!-- Separador -->
        <hr class="my-5">

        <!-- Tabla de inventario actual -->
        <h3 class="text-center mb-4">Inventario Actual</h3>
        <div class="table-responsive">
            <table class="table table-hover bg-white shadow-sm rounded">
                <!-- Encabezado de tabla -->
                <thead class="table-danger">
                    <tr>
                        <th>Producto</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <!-- Cuerpo de tabla -->
                <tbody>
                    {% for producto in productos %}
                    <tr>
                        <!-- Nombre del producto -->
                        <td>{{ producto.nombre }}</td>
                        <!-- Categoría con badge -->
                        <td><span class="badge bg-secondary">{{ producto.categoria }}</span></td>
                        <!-- Precio formateado -->
                        <td>${{ "{:,.0f}".format(producto.precio) }}</td>
                        <!-- Botones de acción -->
                        <td>
                            <a href="{{ url_for('edit_product', id=producto.id) }}" class="btn btn-sm btn-warning">Editar</a>
                            <a href="{{ url_for('delete_product', id=producto.id) }}" 
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('¿Seguro?')">Eliminar</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
