{% extends 'base.html' %}

{% block title %}Acceso Admin | Wal-Bross{% endblock %}

{% block styles %}
<style>
    /* Estilos específicos para que el login se vea impecable */
    body {
        background-color: #1a1a1a !important; /* Forzamos el fondo oscuro */
        height: 100vh;
        display: flex;
        flex-direction: column;
    }
    /* Ocultamos el navbar solo en el login para que se vea más profesional */
    nav { display: none !important; }
    footer { display: none !important; }

    .login-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .login-card {
        background-color: #ffffff;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(255, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
        text-align: center;
    }
    .logo-login {
        width: 120px;
        height: 120px;
        margin-bottom: 20px;
        object-fit: contain;
        border: 3px solid #ff0000;
        border-radius: 50%;
        padding: 5px;
        background: white;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card mx-3">
        <img src="{{ url_for('static', filename='logo/Walbross.png.jpeg') }}" alt="Logo Wal-Bross" class="logo-login">
        
        <h3 class="fw-bold text-dark mb-1">Wal-Bross</h3>
        <p class="text-muted mb-4 small">Panel de Administración</p>

        <form method="POST">
            <div class="mb-3 text-start">
                <label class="form-label text-dark small fw-bold">Contraseña Maestra</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required autofocus>
            </div>
            <button type="submit" class="btn btn-danger w-100 py-2 fw-bold shadow-sm">
                INGRESAR AL PANEL
            </button>
        </form>
        
        <div class="mt-4">
            <a href="{{ url_for('index') }}" class="text-decoration-none text-muted small">← Volver al Menú</a>
        </div>
    </div>
</div>
{% endblock %}
