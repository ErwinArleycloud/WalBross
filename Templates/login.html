<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"> <!-- Codificación de caracteres -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Adaptación a móviles -->
    <title>Acceso Admin | Wal-Bross</title> <!-- Título de la pestaña -->

    <!-- Importa Bootstrap desde CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos internos para la página de login -->
    <style>
        body {
            background-color: #1a1a1a; /* Fondo oscuro */
            height: 100vh; /* Ocupa toda la altura de la ventana */
            display: flex; /* Centrado vertical y horizontal */
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background-color: #ffffff; /* Fondo blanco de la tarjeta */
            border-radius: 15px; /* Bordes redondeados */
            padding: 30px; /* Espaciado interno */
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.2); /* Sombra con tono rojo */
            width: 100%;
            max-width: 400px; /* Ancho máximo */
            text-align: center; /* Centrado del contenido */
        }
        .logo-login {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            object-fit: contain; /* Ajusta la imagen sin deformarla */
            border: 3px solid #ff0000; /* Borde rojo */
            border-radius: 50%; /* Forma circular */
            padding: 5px;
            background: white; /* Fondo blanco detrás del logo */
        }
    </style>
</head>
<body>

    <!-- Tarjeta de login -->
    <div class="login-card mx-3">
        <!-- Logo de la empresa -->
        <img src="{{ url_for('static', filename='logo/WalBross.png.jpeg') }}" alt="Logo Wal-Bross" class="logo-login">
        
        <!-- Título y subtítulo -->
        <h3 class="fw-bold text-dark mb-1">Wal-Bross</h3>
        <p class="text-muted mb-4 small">Panel de Administración</p>

        <!-- Formulario de acceso -->
        <form method="POST">
            <div class="mb-3 text-start">
                <label class="form-label text-dark small fw-bold">Contraseña Maestra</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required autofocus>
            </div>
            <!-- Botón de ingreso -->
            <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">
                INGRESAR AL PANEL
            </button>
        </form>
        
        <!-- Enlace para volver al menú principal -->
        <div class="mt-4">
            <a href="{{ url_for('index') }}" class="text-decoration-none text-muted small">← Volver al Menú</a>
        </div>
    </div>

</body>
</html>
