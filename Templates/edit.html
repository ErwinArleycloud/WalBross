{% extends 'base.html' %}

{% block title %}Editar Producto | Wal-Bross{% endblock %}

{% block content %}
<div class="container mt-5"> 
    <div class="card shadow p-4 mx-auto" style="max-width: 500px; border-top: 5px solid #ffc107;">
        <h2 class="text-center mb-4 text-warning fw-bold">Editar Producto</h2>
        
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label fw-bold">Nombre del Producto</label>
                <input type="text" name="nombre" class="form-control" value="{{ producto.nombre }}" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="3" required>{{ producto.descripcion }}</textarea>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Precio</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" name="precio" class="form-control" value="{{ producto.precio }}" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Imagen Actual: <span class="text-primary">{{ producto.imagen }}</span></label>
                <p class="small text-muted italic">Si no seleccionas nada, se mantendrá la misma foto.</p>
                <input type="file" name="imagen_archivo" class="form-control" accept="image/*">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Categoría</label>
                <select name="categoria" class="form-select">
                    <option value="pollos" {% if producto.categoria == 'pollos' %}selected{% endif %}>Pollos</option>
                    <option value="combos" {% if producto.categoria == 'combos' %}selected{% endif %}>Combos</option>
                    <option value="bebidas" {% if producto.categoria == 'bebidas' %}selected{% endif %}>Bebidas</option>
                    <option value="adicionales" {% if producto.categoria == 'adicionales' %}selected{% endif %}>Adicionales</option>
                </select>
            </div>

            <div class="form-check mb-4">
                <input type="checkbox" name="es_promocion" class="form-check-input" id="promo" {% if producto.es_promocion %}checked{% endif %}>
                <label class="form-check-label" for="promo">¿Es oferta?</label>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning w-100 fw-bold">Actualizar</button>
                <a href="{{ url_for('admin') }}" class="btn btn-secondary w-100">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
