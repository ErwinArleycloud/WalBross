<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"> <!-- Codificación de caracteres -->
    <title>Editar Producto | Wal-Bross</title> <!-- Título de la pestaña -->
    <!-- Importa Bootstrap desde CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light"> <!-- Fondo gris claro -->

    <div class="container mt-5"> <!-- Contenedor principal con margen superior -->
        <!-- Tarjeta para editar producto -->
        <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
            <h2 class="text-center mb-4 text-warning">Editar Producto</h2>
            
            <!-- Formulario para editar producto -->
            <form method="POST" enctype="multipart/form-data">
                <!-- Campo nombre -->
                <div class="mb-3">
                    <label class="form-label">Nombre del Producto</label>
                    <input type="text" name="nombre" class="form-control" value="{{ producto.nombre }}" required>
                </div>
                <!-- Campo descripción -->
                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea name="descripcion" class="form-control" required>{{ producto.descripcion }}</textarea>
                </div>
                <!-- Campo precio -->
                <div class="mb-3">
                    <label class="form-label">Precio</label>
                    <input type="number" name="precio" class="form-control" value="{{ producto.precio }}" required>
                </div>
                
                <!-- Campo imagen -->
                <div class="mb-3">
                    <label class="form-label">Imagen Actual: <b>{{ producto.imagen }}</b></label>
                    <p class="small text-muted">Si no seleccionas nada, se mantendrá la misma foto.</p>
                    <input type="file" name="imagen_archivo" class="form-control" accept="image/*">
                </div>

                <!-- Campo categoría con selección dinámica -->
                <div class="mb-3">
                    <label class="form-label">Categoría</label>
                    <select name="categoria" class="form-select">
                        <option value="pollos" {% if producto.categoria == 'pollos' %}selected{% endif %}>Pollos</option>
                        <option value="combos" {% if producto.categoria == 'combos' %}selected{% endif %}>Combos</option>
                        <option value="bebidas" {% if producto.categoria == 'bebidas' %}selected{% endif %}>Bebidas</option>
                        <option value="adicionales" {% if producto.categoria == 'adicionales' %}selected{% endif %}>Adicionales</option>
                    </select>
                </div>

                <!-- Checkbox de promoción -->
                <div class="form-check mb-3">
                    <input type="checkbox" name="es_promocion" class="form-check-input" id="promo" {% if producto.es_promocion %}checked{% endif %}>
                    <label class="form-check-label" for="promo">¿Es oferta?</label>
                </div>

                <!-- Botones de acción -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-warning w-100">Actualizar</button>
                    <a href="{{ url_for('admin') }}" class="btn btn-secondary w-100">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
